/* Updated renderPipeline with USD */
function renderPipeline() {
  const t = i18n[lang];
  const cols = document.getElementById('pipeline-cols');
  const rate = 158.5; // approx JPY per USD

  cols.innerHTML = t.pipelineStages.map((stage,i) => {
    const deals = t.pipelineData[i] || [];
    return `<div class="pcol">
      <div class="pcol-head"><span>${stage}</span><span class="pcol-count">${deals.length}</span></div>
      ${deals.map(d => {
        // Convert ¥XX億 to USD (1億 = 100M JPY → ~$0.63M)
        let usd = '';
        if (d.size.includes('億')) {
          const num = parseInt(d.size.replace(/[^0-9]/g,''));
          const usdM = Math.round(num * 100 / rate);
          usd = usdM >= 1000 ? ` (~$${(usdM/1000).toFixed(1)}B)` : ` (~$${usdM}M)`;
        }
        return `<div class="pdeal"><div class="pdeal-name">${d.name}</div><div class="pdeal-size">${d.size}${usd}</div><span class="pdeal-tag">${d.sector}</span></div>`;
      }).join('')}
    </div>`;
  }).join('');
}
